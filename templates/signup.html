{% extends "base.html" %}

{% block body_class %}auth-background{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="sub-text">
            Join AI Career Copilot to unlock your full potential.
        </p>
        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="password" name="password" placeholder="Create a password" required minlength="6">
            <p class="sub-text">Use at least 6 characters</p>
            <button type="submit">Sign up</button>
        </form>
        <p class="switch-auth">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
